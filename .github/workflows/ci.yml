# CI skeleton for a Pico SDK project.
#
# Adapt the environment variables at the top of this file to match your project.
# This workflow builds the firmware for both RP2040 and RP2350 targets and,
# if host-compilable unit tests are present, runs them on the build agent.
#
# Required repository secrets / variables:
#   None by default — the Pico SDK is fetched from GitHub.
#
# To use:
#   1. Copy this file to your project's .github/workflows/ directory.
#   2. Adjust PICO_SDK_VERSION, BUILD_DIR, and (optionally) PICO_BOARD.
#   3. Add or remove build matrix entries in the "target" matrix.

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PICO_SDK_VERSION: "2.1.1"       # Pin to a known-good SDK release
  BUILD_DIR: build
  CMAKE_BUILD_TYPE: Release

jobs:
  # --------------------------------------------------------------------------
  # Firmware build (cross-compile for RP2040 and RP2350)
  # --------------------------------------------------------------------------
  build-firmware:
    name: Build firmware (${{ matrix.target }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - board: pico
            chip: RP2040
          - board: pico2
            chip: RP2350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            cmake \
            ninja-build \
            python3

      - name: Cache Pico SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pico-sdk
          key: pico-sdk-${{ env.PICO_SDK_VERSION }}

      - name: Fetch Pico SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.PICO_SDK_VERSION }} \
            https://github.com/raspberrypi/pico-sdk.git \
            ${{ runner.temp }}/pico-sdk
          cd ${{ runner.temp }}/pico-sdk
          git submodule update --init --depth 1

      - name: Configure CMake
        run: |
          cmake -B ${{ env.BUILD_DIR }} \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DPICO_SDK_PATH=${{ runner.temp }}/pico-sdk \
            -DPICO_BOARD=${{ matrix.target.board }}

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --parallel

      - name: Upload firmware artefacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target.chip }}
          path: |
            ${{ env.BUILD_DIR }}/**/*.uf2
            ${{ env.BUILD_DIR }}/**/*.elf
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # Host-side unit tests (compiled with the native toolchain)
  # --------------------------------------------------------------------------
  unit-tests:
    name: Host unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run this job if a tests/ directory exists in the repository.
    # Remove the `if` condition once tests are added.
    if: ${{ false }}   # TODO: remove this line when host tests are added

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake ninja-build gcc

      - name: Configure (host)
        run: |
          cmake -B build-host \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_HOST_TESTS=ON

      - name: Build tests
        run: cmake --build build-host --parallel

      - name: Run tests
        run: ctest --test-dir build-host --output-on-failure
